# CI — Post-merge verification on `main`
#
# Runs immediately after every merge to `main`. Confirms the merged commit
# is healthy end-to-end, independent of the branch CI that ran before merge.
#
# Strategy: single job — build artifacts and apt packages are installed once,
# then reused across all check steps. Cargo and apt caches persist between runs.

name: Main — Build & Test

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings --cap-lints=warn"

jobs:
  ci:
    name: Build, Test, Fmt, Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Cache apt packages so GTK/WebKit is only downloaded on first run
      # ------------------------------------------------------------------
      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: /var/cache/apt/archives
          key: apt-webkit-${{ runner.os }}-${{ hashFiles('.github/workflows/main.yml') }}

      - name: Install system dependencies (GTK / WebKit — required by Dioxus desktop)
        if: steps.apt-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Restore cached apt packages (warm run)
        if: steps.apt-cache.outputs.cache-hit == 'true'
        run: sudo dpkg -i /var/cache/apt/archives/*.deb 2>/dev/null || true

      # ------------------------------------------------------------------
      # Rust toolchain + Cargo cache
      # ------------------------------------------------------------------
      - name: Install stable Rust toolchain (rustfmt + clippy included)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Separate cache key from PR runs so main always has a clean cache.
      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "gloc-main-${{ runner.os }}"

      # ------------------------------------------------------------------
      # Step 1: Format check
      # ------------------------------------------------------------------
      - name: Check formatting
        run: cargo fmt --all -- --check

      # ------------------------------------------------------------------
      # Step 2: Build (debug + release)
      # ------------------------------------------------------------------
      - name: Build workspace (debug)
        run: cargo build --workspace --locked

      - name: Build workspace (release)
        run: cargo build --workspace --locked --release

      # ------------------------------------------------------------------
      # Step 3: Tests
      # ------------------------------------------------------------------
      - name: Run all tests (unit, integration, doc-tests)
        run: cargo test --workspace --locked

      - name: Run trybuild UI tests (macro compile-error snapshots)
        env:
          TRYBUILD: overwrite
        run: cargo test -p gloc-macro --test ui_tests --locked

      # ------------------------------------------------------------------
      # Step 4: Clippy
      # ------------------------------------------------------------------
      - name: Run clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # -----------------------------------------------------------------------
  # Notify on failure (main only)
  # -----------------------------------------------------------------------
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: ci
    if: failure()

    steps:
      - name: Post failure summary
        run: |
          echo "::error::CI failed on main after merge."
          echo "::error::Check the failed steps above and push a fix commit immediately."
