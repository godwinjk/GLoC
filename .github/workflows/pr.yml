# CI — Pull Request gate
#
# Every pull request targeting `main` must pass before merge.
# Also triggered on every push to a PR branch for in-flight feedback.
#
# Strategy:
#   - `fmt` runs immediately in parallel — no compilation or system deps.
#   - `build` compiles debug + release and uploads target/ as an artifact.
#   - `test` and `clippy` download that artifact and run in parallel, avoiding
#     redundant compilation.
#   - System deps and Cargo registry are cached so warm runs stay fast.

name: PR — Build & Test

on:
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same PR branch when a new commit is pushed.
concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings --cap-lints=warn"

jobs:

  # --------------------------------------------------------------------------
  # Fast gate — runs immediately, no system deps or compilation needed.
  # --------------------------------------------------------------------------
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # --------------------------------------------------------------------------
  # Build — compiles debug + release, uploads artifacts for downstream jobs.
  # --------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: /var/cache/apt/archives
          key: apt-gloc-${{ runner.os }}-${{ hashFiles('.github/workflows/pr.yml') }}

      - name: Install system dependencies
        if: steps.apt-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libudev-dev

      - name: Restore cached apt packages (warm run)
        if: steps.apt-cache.outputs.cache-hit == 'true'
        run: sudo dpkg -i /var/cache/apt/archives/*.deb 2>/dev/null || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "gloc-pr-${{ runner.os }}"

      - name: Build workspace (debug)
        run: cargo build --workspace --locked

      - name: Build workspace (release)
        run: cargo build --workspace --locked --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: |
            target/debug
            target/release
          retention-days: 1

  # --------------------------------------------------------------------------
  # Test + Clippy — run in parallel after build, share its artifacts.
  # --------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: /var/cache/apt/archives
          key: apt-gloc-${{ runner.os }}-${{ hashFiles('.github/workflows/pr.yml') }}

      - name: Install system dependencies
        if: steps.apt-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libudev-dev

      - name: Restore cached apt packages (warm run)
        if: steps.apt-cache.outputs.cache-hit == 'true'
        run: sudo dpkg -i /var/cache/apt/archives/*.deb 2>/dev/null || true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "gloc-pr-${{ runner.os }}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: target

      - name: Run all tests (unit, integration, doc-tests)
        run: cargo test --workspace --locked

      - name: Run trybuild UI tests (macro compile-error snapshots)
        env:
          TRYBUILD: overwrite
        run: cargo test -p gloc-macro --test ui_tests --locked

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: /var/cache/apt/archives
          key: apt-gloc-${{ runner.os }}-${{ hashFiles('.github/workflows/pr.yml') }}

      - name: Install system dependencies
        if: steps.apt-cache.outputs.cache-hit == 'true'
        run: sudo dpkg -i /var/cache/apt/archives/*.deb 2>/dev/null || true

      - name: Install system dependencies (cold run)
        if: steps.apt-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libudev-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "gloc-pr-${{ runner.os }}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: target

      - name: Run clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
