# CI — Publish to crates.io
#
# Triggered by pushing a version tag: git tag v0.1.0 && git push --tags
#
# Publish order matters — dependencies must be published before dependents:
#   1. gloc-core  (core — no GLOC deps)
#   2. gloc-macro (proc macro — no GLOC deps)
#   3. gloc       (umbrella — depends on gloc-core + gloc-macro)
#
# Requires a GitHub secret: CARGO_REGISTRY_TOKEN
# Set it at: repo → Settings → Secrets → Actions → New repository secret

name: Publish to crates.io

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # matches v0.1.0, v1.2.3, etc.

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ---------------------------------------------------------------------------
  # Gate: run the full CI suite before publishing anything
  # ---------------------------------------------------------------------------
  ci:
    name: Verify before publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: /var/cache/apt/archives
          key: apt-webkit-${{ runner.os }}-${{ hashFiles('.github/workflows/publish.yml') }}

      - name: Install system dependencies
        if: steps.apt-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Restore cached apt packages (warm run)
        if: steps.apt-cache.outputs.cache-hit == 'true'
        run: sudo dpkg -i /var/cache/apt/archives/*.deb 2>/dev/null || true

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "gloc-publish-${{ runner.os }}"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # ---------------------------------------------------------------------------
  # Publish: only runs after CI passes
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "gloc-publish-${{ runner.os }}"

      # Publish in dependency order — crates.io requires deps to exist first.
      # `--no-verify` skips the local build check (already done in CI job above).

      - name: Publish gloc-core
        run: cargo publish -p gloc-core --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # crates.io can take up to 60s to fully index a newly published crate.
      # Dependents that try to resolve it before indexing completes will fail.
      - name: Wait for crates.io to index gloc-core
        run: sleep 60

      - name: Publish gloc-macro
        run: cargo publish -p gloc-macro --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index gloc-macro
        run: sleep 60

      - name: Publish gloc (umbrella)
        run: cargo publish -p gloc --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
