# CI — Publish to crates.io
#
# Triggered by pushing a version tag: git tag v0.2.0 && git push --tags
#
# Publish order matters — dependencies must be published before dependents:
#   1. gloc-core   (core — no GLoC deps)
#   2. gloc-macro  (proc macro — no GLoC deps at runtime; gloc is dev-only)
#   3. gloc        (umbrella — depends on gloc-core + gloc-macro)
#   4. gloc-test   (test helpers — depends on gloc-core)
#   5. gloc-axum   (Axum adapter — depends on gloc)
#   6. gloc-bevy   (Bevy adapter — depends on gloc)
#   7. gloc-dioxus (Dioxus adapter — depends on gloc)
#
# Requires a GitHub secret: CARGO_REGISTRY_TOKEN
# Set it at: repo → Settings → Secrets → Actions → New repository secret

name: Publish to crates.io

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # matches v0.1.0, v1.2.3, etc.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ---------------------------------------------------------------------------
  # Gate: run the full CI suite before publishing anything
  # ---------------------------------------------------------------------------
  ci:
    name: Verify before publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: /var/cache/apt/archives
          key: apt-webkit-${{ runner.os }}-${{ hashFiles('.github/workflows/publish.yml') }}

      - name: Install system dependencies
        run: |
          if [ "${{ steps.apt-cache.outputs.cache-hit }}" != "true" ]; then
            sudo apt-get update -y
          fi
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libudev-dev

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "gloc-publish-${{ runner.os }}"
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # ---------------------------------------------------------------------------
  # Publish: only runs after CI passes
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "gloc-publish-${{ runner.os }}"
          cache-on-failure: true

      # Publish in dependency order — crates.io requires deps to exist before
      # dependents can resolve them. `--no-verify` skips the local build check
      # (already done in the CI job above).
      # crates.io can take up to 60s to fully index a newly published crate,
      # so each step sleeps before the next dependent is published.

      - name: Publish gloc-core
        run: cargo publish -p gloc-core --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index gloc-core
        run: sleep 60

      - name: Publish gloc-macro
        run: cargo publish -p gloc-macro --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index gloc-macro
        run: sleep 60

      - name: Publish gloc (umbrella)
        run: cargo publish -p gloc --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index gloc
        run: sleep 60

      # gloc-test depends on gloc-core (already indexed above).
      - name: Publish gloc-test
        run: cargo publish -p gloc-test --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index gloc-test
        run: sleep 60

      # Adapters all depend on gloc. Publish sequentially to avoid race
      # conditions with crates.io indexing.
      - name: Publish gloc-axum
        run: cargo publish -p gloc-axum --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index gloc-axum
        run: sleep 60

      - name: Publish gloc-bevy
        run: cargo publish -p gloc-bevy --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index gloc-bevy
        run: sleep 60

      - name: Publish gloc-dioxus
        run: cargo publish -p gloc-dioxus --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
