  <!-- ── WAVE EMISSIONS ──
       6 waves at 0°,60°,120°,180°,240°,300° using rotate() transform
       Base wave goes RIGHT from center: sinusoidal undulation along X axis
       Each wave is identical path, just rotated around center (250,250)
       Wave path: starts at (250,250), travels right to ~(430,250) with sine bumps
       perpendicular amplitude 10px, wavelength ~40px -->

