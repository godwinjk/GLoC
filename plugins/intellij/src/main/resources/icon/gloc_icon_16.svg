       Q control points create sinusoidal shape
       M 250,250  → Q 260,238 → 270,250 → Q 280,262 → 290,250 → Q 300,238 → 310,250 → Q 320,262 → 330,250 → Q 340,238 → 350,250 → Q 360,262 → 370,250 → Q 380,238 → 390,250 → Q 400,262 → 410,250 → 420,250 -->

