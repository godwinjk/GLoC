<svg viewBox="0 0 510 510" xmlns="http://www.w3.org/2000/svg" width="16" height="16" style="">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#FBBF90" stop-opacity="1"/>
      <stop offset="50%" stop-color="#F0804A" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#C04820" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4A1004" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plasma" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E07030" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#B94A1A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#7A2808" stop-opacity="0"/>
    </radialGradient>
    <!-- Wave trail gradients aligned to each direction -->
    <!-- 0° right -->
    <linearGradient id="g0" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0804A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E07030" stop-opacity="0"/>
